<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pico 2W · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --s2:      #1c2128;
  --s3:      #22272e;
  --border:  #30363d;
  --b2:      #21262d;
  --green:   #3fb950;
  --teal:    #39d0b8;
  --amber:   #f0883e;
  --blue:    #58a6ff;
  --red:     #f85149;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --faint:   #484f58;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Inter', system-ui, sans-serif;
}

/* Full-height column layout — the key to correct scroll behaviour */
html { height: 100%; }
body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;   /* body itself never scrolls; only .tbl-body does */
}

/* ── Nav ──────────────────────────────────────────────────────────────── */
.nav {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.nav-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg,#1b3c23,#0d1117);
  border: 1px solid rgba(63,185,80,.28);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.nav-name   { font-size: 14px; font-weight: 600; color: var(--text); }
.nav-sub    { font-size: 10px; font-family: var(--mono); color: var(--faint); margin-top: 1px; }

.spacer { flex: 1; }

.live-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--green);
  background: rgba(63,185,80,.08);
  border: 1px solid rgba(63,185,80,.2);
  border-radius: 999px;
  padding: 3px 10px 3px 7px;
  flex-shrink: 0;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 5px var(--green);
  flex-shrink: 0;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

.nav-timer {
  font-family: var(--mono); font-size: 12px; color: var(--muted);
  white-space: nowrap; flex-shrink: 0;
}
.nav-timer b { color: var(--teal); font-weight: 500; }

.btn-logout {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px; cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  white-space: nowrap;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); background: rgba(248,81,73,.06); }

/* ── Metric cards ─────────────────────────────────────────────────────── */
.metrics {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--border);
}
.metric {
  padding: 18px 20px 16px;
  border-right: 1px solid var(--border);
  position: relative;
}
.metric:last-child { border-right: none; }

/* coloured left accent stripe */
.metric::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 2px 2px 0;
}
.metric.temp::before  { background: var(--amber); }
.metric.press::before { background: var(--green); }
.metric.hum::before   { background: var(--blue); }

.m-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.m-val {
  font-family: var(--mono);
  font-size: 30px; font-weight: 600;
  line-height: 1; letter-spacing: -.5px;
  margin-bottom: 3px;
  transition: opacity .2s;
}
.metric.temp  .m-val { color: var(--amber); }
.metric.press .m-val { color: var(--green); }
.metric.hum   .m-val { color: var(--blue); }

.m-unit { font-family: var(--mono); font-size: 10px; color: var(--faint); }

/* ── Table section ────────────────────────────────────────────────────── */
/*
 * .tbl-wrap takes all remaining vertical space.
 * .tbl-head is fixed; .tbl-body scrolls within .tbl-wrap.
 */
.tbl-wrap {
  flex: 1 1 0;       /* grow to fill remaining height */
  min-height: 0;     /* critical: lets flex child shrink below content size */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tbl-head {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 52px 1fr 1fr 1fr 68px;
  align-items: center;
  height: 34px;
  padding: 0 20px;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
}
.th {
  font-size: 10px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--faint);
}
.th.r { text-align: right; }

.tbl-body {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
}
.tbl-body::-webkit-scrollbar { width: 5px; }
.tbl-body::-webkit-scrollbar-track { background: transparent; }
.tbl-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }
.tbl-body::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* individual data row */
.row {
  display: grid;
  grid-template-columns: 52px 1fr 1fr 1fr 68px;
  align-items: center;
  height: 42px;
  padding: 0 20px;
  border-bottom: 1px solid var(--b2);
  transition: background .1s;
  animation: rowIn .3s cubic-bezier(.22,1,.36,1) both;
}
.row:hover { background: rgba(255,255,255,.023); }

@keyframes rowIn {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}
.row.new {
  animation: newFlash .55s ease both;
}
@keyframes newFlash {
  0%   { background: rgba(63,185,80,.1); opacity:0; transform:translateY(-8px); }
  30%  { opacity:1; transform:translateY(0); }
  100% { background: transparent; }
}

.cell-n  { font-family: var(--mono); font-size: 11px; color: var(--faint); }
.cell-v  { font-family: var(--mono); font-size: 13px; font-weight: 500; text-align: right; }
.cell-v.t { color: var(--amber); }
.cell-v.p { color: var(--green); }
.cell-v.h { color: var(--blue); }
.cell-u  { font-size: 9px; color: var(--faint); margin-left: 2px; }
.cell-ts { font-family: var(--mono); font-size: 10px; color: var(--faint); text-align: right; }

/* empty state */
.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 56px 20px;
  color: var(--muted);
}
.empty-ico { font-size: 34px; opacity: .45; }
.empty-txt { font-size: 13px; }
.empty-sub { font-family: var(--mono); font-size: 11px; color: var(--faint); }

/* ── Footer ───────────────────────────────────────────────────────────── */
.foot {
  flex: 0 0 auto;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  height: 36px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--faint);
}
.foot b { color: var(--muted); font-weight: 500; }
.foot .spacer { flex: 1; }
.foot-srv {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10.5px; color: var(--faint);
  min-width: 0;
}
.foot-srv span {
  color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 240px;
}
.btn-tiny {
  flex-shrink: 0;
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--faint);
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  padding: 3px 9px; border-radius: 5px; cursor: pointer;
  transition: border-color .15s, color .15s;
  white-space: nowrap;
}
.btn-tiny:hover { border-color: var(--teal); color: var(--teal); }

/* ── Toast ────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 48px; right: 18px;
  background: var(--surface);
  border: 1px solid var(--border); border-left: 3px solid var(--red);
  font-family: var(--mono); font-size: 12px; color: var(--text);
  padding: 10px 16px; border-radius: 7px; z-index: 99;
  max-width: 320px;
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.toast.show    { opacity:1; transform:translateY(0); }
.toast.ok      { border-left-color: var(--green); }
.toast.warning { border-left-color: #f0883e; }

/* ── Responsive ───────────────────────────────────────────────────────── */
@media (max-width: 580px) {
  .metrics { grid-template-columns: 1fr; }
  .metric  { border-right: none; border-bottom: 1px solid var(--b2); padding: 14px 16px 12px; }
  .metric:last-child { border-bottom: none; }
  .m-val   { font-size: 24px; }
  .nav     { padding: 0 12px; gap: 8px; }
  .nav-sub { display: none; }
  .nav-timer { display: none; }
  /* collapse time column on small screens */
  .tbl-head, .row { grid-template-columns: 44px 1fr 1fr 1fr; padding: 0 12px; }
  .th.r.time-col, .cell-ts { display: none; }
  .foot { padding: 0 12px; }
  .foot-srv span { max-width: 130px; }
}
</style>
</head>
<body>

<!-- ── Nav ───────────────────────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-icon">🌡</div>
    <div>
      <div class="nav-name">Pico Monitor</div>
      <div class="nav-sub">Pico 2W · ENV Sensor</div>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="live-pill"><span class="live-dot"></span>Live</div>

  <div class="nav-timer">Next in <b id="timer">5</b>s</div>

  <button class="btn-logout" id="btn-logout">
    <!-- inline SVG logout icon, no external dependency -->
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Logout
  </button>
</nav>

<!-- ── Metric cards ───────────────────────────────────────────────────── -->
<div class="metrics">
  <div class="metric temp">
    <div class="m-label">🌡 Temperature</div>
    <div class="m-val" id="m-temp">—</div>
    <div class="m-unit">degrees Celsius (°C)</div>
  </div>
  <div class="metric press">
    <div class="m-label">🔵 Pressure</div>
    <div class="m-val" id="m-press">—</div>
    <div class="m-unit">hectopascals (hPa)</div>
  </div>
  <div class="metric hum">
    <div class="m-label">💧 Humidity</div>
    <div class="m-val" id="m-hum">—</div>
    <div class="m-unit">relative humidity (%)</div>
  </div>
</div>

<!-- ── Table ──────────────────────────────────────────────────────────── -->
<div class="tbl-wrap">
  <div class="tbl-head">
    <span class="th">#</span>
    <span class="th r">Temp (°C)</span>
    <span class="th r">Pressure (hPa)</span>
    <span class="th r">Humidity (%)</span>
    <span class="th r time-col">Time</span>
  </div>
  <div class="tbl-body" id="tbl-body">
    <div class="empty" id="empty-state">
      <div class="empty-ico">📡</div>
      <div class="empty-txt">Waiting for first reading…</div>
      <div class="empty-sub">Polls every 5 seconds</div>
    </div>
  </div>
</div>

<!-- ── Footer ─────────────────────────────────────────────────────────── -->
<footer class="foot">
  Readings: <b id="count">0</b>
  <div class="spacer"></div>
  <div class="foot-srv">
    Server: <span id="foot-srv">—</span>
    <button class="btn-tiny" id="btn-change-srv">Change</button>
  </div>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  /*
   * Use localStorage (not sessionStorage) so the server URL set on
   * index.html is still available when status.html is opened as a
   * separate local file — sessionStorage is per-tab and is lost on
   * navigation between file:// pages.
   */
  const SK = 'pico_server_url';
  let srv = localStorage.getItem(SK) || '';

  function refreshSrvDisplay() {
    document.getElementById('foot-srv').textContent = srv || '(not set)';
  }
  function askServer() {
    const v = prompt(
      'Enter Pico server base URL\n(e.g. http://192.168.1.100:5000)',
      srv || 'http://'
    );
    if (v && v.trim()) {
      srv = v.trim().replace(/\/+$/, '');
      localStorage.setItem(SK, srv);
      refreshSrvDisplay();
    }
  }
  if (!srv) askServer();
  refreshSrvDisplay();
  document.getElementById('btn-change-srv').addEventListener('click', askServer);

  /* ── Toast ──────────────────────────────────────────────────────────── */
  let toastTmr;
  function showToast(msg, kind) {   // kind: '' | 'ok' | 'warning'
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (kind ? ' ' + kind : '');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => { el.className = 'toast'; }, 4000);
  }

  /* ── State ──────────────────────────────────────────────────────────── */
  let count    = 0;
  let countdown = 5;
  let tickHandle = null;

  /* ── Fetch /status ──────────────────────────────────────────────────── */
  async function fetchStatus() {
    if (!srv) { showToast('Server not configured — click Change'); return; }

    try {
      const res = await fetch(srv + '/status', {
        /*
         * 'include' sends the pico_session cookie that was set by /login.
         * Requires the server to return a specific ACAO origin (not *) and
         * Access-Control-Allow-Credentials: true.
         */
        credentials: 'include',
        cache: 'no-store',
      });

      if (res.status === 401) {
        /*
         * Server returns {"error":"Unauthorized","redirect":"/login"} on 401.
         * We redirect to the local index.html, not to the Pico's /login path.
         */
        showToast('Session expired — returning to login…');
        setTimeout(() => { window.location.href = 'index.html'; }, 1800);
        return;
      }

      if (!res.ok) {
        showToast('Server error: HTTP ' + res.status);
        return;
      }

      /*
       * Expected JSON from /status:
       *   { "temperature": float, "pressure": float, "humidity": float, "status": "ok" }
       */
      const d = await res.json();
      insertRow(d.temperature, d.pressure, d.humidity);

    } catch (err) {
      const isCors = err instanceof TypeError;
      showToast(
        isCors
          ? 'CORS error — ensure server echoes Origin + Allow-Credentials'
          : 'Network error — retrying in 5 s',
        isCors ? 'warning' : ''
      );
    }
  }

  /* ── Insert row ─────────────────────────────────────────────────────── */
  function fmt(n, dp) {
    return (typeof n === 'number' && isFinite(n)) ? n.toFixed(dp) : '—';
  }

  function insertRow(temp, press, hum) {
    count++;
    document.getElementById('count').textContent = count;

    /* Update summary cards */
    document.getElementById('m-temp').textContent  = fmt(temp,  1);
    document.getElementById('m-press').textContent = fmt(press, 1);
    document.getElementById('m-hum').textContent   = fmt(hum,   1);

    /* Remove empty-state placeholder on first row */
    const es = document.getElementById('empty-state');
    if (es) es.remove();

    /* Timestamp */
    const now = new Date();
    const ts  = now.toLocaleTimeString([], {
      hour:   '2-digit',
      minute: '2-digit',
      second: '2-digit',
    });

    const row = document.createElement('div');
    row.className = 'row new';
    row.innerHTML =
      '<span class="cell-n">' + String(count).padStart(3, '0') + '</span>' +
      '<span class="cell-v t">' + fmt(temp,  2) + '<span class="cell-u">°C</span></span>'  +
      '<span class="cell-v p">' + fmt(press, 2) + '<span class="cell-u">hPa</span></span>' +
      '<span class="cell-v h">' + fmt(hum,   2) + '<span class="cell-u">%</span></span>'   +
      '<span class="cell-ts">'  + ts + '</span>';

    const body = document.getElementById('tbl-body');
    body.insertBefore(row, body.firstChild);
  }

  /* ── Countdown ──────────────────────────────────────────────────────── */
  function startCountdown() {
    countdown = 5;
    document.getElementById('timer').textContent = countdown;
    clearInterval(tickHandle);
    tickHandle = setInterval(() => {
      countdown--;
      document.getElementById('timer').textContent = countdown;
      if (countdown <= 0) {
        clearInterval(tickHandle);
        fetchStatus().then(startCountdown);
      }
    }, 1000);
  }

  /* ── Logout ─────────────────────────────────────────────────────────── */
  document.getElementById('btn-logout').addEventListener('click', async () => {
    clearInterval(tickHandle);
    if (srv) {
      try {
        /*
         * GET /logout — server deletes the session and expires the cookie.
         * We still include credentials so the cookie is sent.
         */
        await fetch(srv + '/logout', { credentials: 'include' });
      } catch { /* ignore network errors on logout */ }
    }
    window.location.href = 'index.html';
  });

  /* ── Boot ────────────────────────────────────────────────────────────── */
  if (srv) {
    fetchStatus().then(startCountdown);
  } else {
    showToast('Server URL not configured — click Change in the footer');
  }

})();
</script>
</body>
</html>
